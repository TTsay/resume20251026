<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>王曉華的履歷-with music</title>
  <style>
    :root {
      --bg-color: #f9f9f9;
      --text-color: #333;
      --accent-color: #0078d7;
      --card-bg: #fff;
    }

    body.dark {
      --bg-color: #1e1e1e;
      --text-color: #f0f0f0;
      --accent-color: #4dabf7;
      --card-bg: #2b2b2b;
    }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    header {
      text-align: center;
      padding: 2rem 1rem;
      background: var(--accent-color);
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    header p {
      margin: 0.3rem 0;
    }

    .container {
      max-width: 800px;
      margin: 2rem auto;
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      border-left: 4px solid var(--accent-color);
      padding-left: 10px;
      margin-top: 1.5rem;
      color: var(--accent-color);
    }

    ul {
      list-style: none;
      padding-left: 0;
    }

    li {
      margin: 0.5rem 0;
    }

    .skills span {
      display: inline-block;
      background: var(--accent-color);
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      margin: 0.2rem;
      font-size: 0.9rem;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .theme-toggle:hover {
      transform: rotate(20deg);
    }
  </style>
</head>
<body>

  <!-- 🎵 背景音樂 -->
<audio id="bgm" autoplay loop playsinline>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById("bgm");

  // 嘗試直接播放
  audio.play().catch(() => {
    // 若被擋，快速解除靜音再播放
    audio.muted = true;
    audio.play();

    setTimeout(() => {
      audio.muted = false;
    }, 100);
  });
</script>

  <button class="theme-toggle" id="themeBtn">☀️</button>

  <header>
    <h1>王曉華</h1>
    <p>亞洲大學一年級學生｜未來目標：成為主廚</p>
    <p>📞 0912-345-678 ｜ ✉️ example@email.com</p>
  </header>

  <div class="container">
    <section>
      <h2>🎓 教育背景</h2>
      <ul>
        <li>亞洲大學 — 餐飲管理系（一年級）</li>
      </ul>
    </section>

    <section>
      <h2>💼 工作經驗</h2>
      <ul>
        <li>目前無工作經驗，具備基本文書處理能力。</li>
      </ul>
    </section>

    <section>
      <h2>🧰 技能</h2>
      <div class="skills">
        <span>Word</span>
        <span>Excel</span>
        <span>PowerPoint</span>
        <span>基本烹飪技巧</span>
      </div>
    </section>

    <section>
      <h2>☕ 職業目標</h2>
      <p>希望未來能開設一間屬於自己的咖啡館，結合手作甜點與自家烘焙咖啡，打造溫暖的交流空間。</p>
    </section>
  </div>

  <script>
  const audio = document.getElementById("bgm");

  // 嘗試直接播放
  audio.play().catch(() => {
    // 若被擋，快速解除靜音再播放
    audio.muted = true;
    audio.play();

    setTimeout(() => {
      audio.muted = false;
    }, 100);
  });
</script>
</body>
</html>
